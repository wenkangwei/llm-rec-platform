global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rec-server"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["rec-server:9090"]
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
