<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Rec Agent</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #1a1a2e; --sidebar: #16213e; --card: #0f3460;
  --border: #1a4080; --text: #e0e0e0; --text2: #a0a0b0;
  --accent: #4fc3f7; --accent2: #0288d1;
  --user-bg: #0d47a1; --bot-bg: #263238;
  --input-bg: #1c2541; --hover: #1e3a5f;
  --success: #66bb6a; --danger: #ef5350;
}
body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* Sidebar */
.sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform .3s; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-header h2 { font-size: 16px; color: var(--accent); margin-bottom: 10px; }
.new-chat-btn { width: 100%; padding: 10px; background: var(--accent2); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background .2s; }
.new-chat-btn:hover { background: var(--accent); color: #000; }
.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; font-size: 13px; color: var(--text2); transition: background .2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-item:hover { background: var(--hover); }
.session-item.active { background: var(--card); color: var(--accent); }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text2); }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.topbar-title { font-size: 15px; color: var(--accent); margin-right: 12px; font-weight: 600; }
.quick-btn { padding: 6px 12px; background: var(--card); border: 1px solid var(--border); color: var(--text2); border-radius: 16px; cursor: pointer; font-size: 12px; transition: all .2s; white-space: nowrap; }
.quick-btn:hover { background: var(--accent2); color: white; border-color: var(--accent2); }
.menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; margin-right: 8px; }

/* Chat area */
.chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: var(--user-bg); border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: var(--bot-bg); border-bottom-left-radius: 4px; }
.msg-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.msg.user .msg-label { text-align: right; }
.typing { align-self: flex-start; padding: 12px 16px; background: var(--bot-bg); border-radius: 12px; display: none; }
.typing-dots span { display: inline-block; width: 6px; height: 6px; background: var(--text2); border-radius: 50%; margin: 0 2px; animation: bounce .8s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .15s; }
.typing-dots span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

/* Input */
.input-area { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; }
.input-area textarea { flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; padding: 10px 14px; font-size: 14px; resize: none; max-height: 120px; min-height: 42px; line-height: 1.5; outline: none; font-family: inherit; }
.input-area textarea:focus { border-color: var(--accent); }
.send-btn { padding: 10px 20px; background: var(--accent2); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; transition: background .2s; flex-shrink: 0; }
.send-btn:hover { background: var(--accent); color: #000; }
.send-btn:disabled { opacity: .5; cursor: not-allowed; }

/* Welcome */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; gap: 16px; }
.welcome h1 { font-size: 28px; color: var(--accent); }
.welcome p { color: var(--text2); font-size: 14px; max-width: 500px; }
.welcome-cards { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 12px; }
.welcome-card { padding: 12px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all .2s; text-align: center; min-width: 140px; }
.welcome-card:hover { border-color: var(--accent); color: var(--accent); }

/* Mobile */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: inline; }
  .msg { max-width: 92%; }
  .topbar { padding: 10px 12px; }
  .quick-btn { font-size: 11px; padding: 5px 8px; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Rec Agent</h2>
    <button class="new-chat-btn" onclick="newSession()">+ New Chat</button>
  </div>
  <div class="session-list" id="sessionList"></div>
  <div class="sidebar-footer">
    <span id="cacheInfo">Cache: -</span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
    <span class="topbar-title">LLM Rec Agent</span>
    <button class="quick-btn" onclick="quickSend('数据库里有多少内容，各来源分布如何')">DB Overview</button>
    <button class="quick-btn" onclick="quickSend('查看推荐链路状态')">Pipeline Status</button>
    <button class="quick-btn" onclick="quickSend('跑一次推荐测试')">Recommend Test</button>
    <button class="quick-btn" onclick="quickSend('查看系统QPS和延迟')">Metrics</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <h1>LLM Rec Agent</h1>
      <p>Recommendation system intelligent operations assistant. Control pipeline, query metrics, test recommendations, and analyze content pool via natural language.</p>
      <div class="welcome-cards">
        <div class="welcome-card" onclick="quickSend('数据库里有多少内容，各来源分布如何')">DB Overview</div>
        <div class="welcome-card" onclick="quickSend('跑一次推荐测试')">Recommend Test</div>
        <div class="welcome-card" onclick="quickSend('查看推荐链路状态')">Pipeline Status</div>
        <div class="welcome-card" onclick="quickSend('查看系统QPS和延迟')">Metrics</div>
        <div class="welcome-card" onclick="quickSend('关闭热门召回通道')">Disable Hot Recall</div>
      </div>
    </div>
  </div>

  <div class="typing" id="typing">
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const API = '/api/chat';
let sessionId = null;
let userId = 'admin';
let sessions = [];

// Auto-resize textarea
const input = document.getElementById('input');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function newSession() {
  sessionId = null;
  document.getElementById('chatArea').innerHTML = '';
  document.getElementById('welcome') || showWelcome();
  showWelcome();
  toggleSidebar(false);
}

function showWelcome() {
  const area = document.getElementById('chatArea');
  area.innerHTML = `<div class="welcome" id="welcome">
    <h1>LLM Rec Agent</h1>
    <p>Recommendation system intelligent operations assistant.</p>
    <div class="welcome-cards">
      <div class="welcome-card" onclick="quickSend('数据库里有多少内容，各来源分布如何')">DB Overview</div>
      <div class="welcome-card" onclick="quickSend('跑一次推荐测试')">Recommend Test</div>
      <div class="welcome-card" onclick="quickSend('查看推荐链路状态')">Pipeline Status</div>
      <div class="welcome-card" onclick="quickSend('查看系统QPS和延迟')">Metrics</div>
    </div></div>`;
}

function addSessionToList(sid, preview) {
  const item = document.createElement('div');
  item.className = 'session-item' + (sid === sessionId ? ' active' : '');
  item.textContent = preview || sid.slice(0, 16) + '...';
  item.onclick = () => { sessionId = sid; item.classList.add('active'); };
  const list = document.getElementById('sessionList');
  list.prepend(item);
}

function addMessage(role, text) {
  // Remove welcome
  const w = document.getElementById('welcome');
  if (w) w.remove();

  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Agent';
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(label);
  div.appendChild(content);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function setTyping(show) {
  const t = document.getElementById('typing');
  t.style.display = show ? 'block' : 'none';
  if (show) {
    const w = document.getElementById('welcome');
    if (w) w.remove();
    document.getElementById('chatArea').appendChild(t);
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
  }
}

function setLoading(on) {
  document.getElementById('sendBtn').disabled = on;
  setTyping(on);
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  setLoading(true);

  try {
    const body = { user_id: userId, message: text };
    if (sessionId) body.session_id = sessionId;

    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.session_id && !sessionId) {
      sessionId = data.session_id;
      addSessionToList(sessionId, text.slice(0, 30));
    }
    addMessage('bot', data.reply || '(empty)');
  } catch (e) {
    addMessage('bot', 'Error: ' + e.message);
  }
  setLoading(false);
}

function quickSend(msg) {
  input.value = msg;
  sendMessage();
}

// No pre-init needed; session created on first real message
</script>
</body>
</html>
