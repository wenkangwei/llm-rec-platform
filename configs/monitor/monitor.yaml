# 监控配置
enabled: true

sinks:
  - type: "stdout"
    level: "INFO"
  - type: "file"
    path: "data/training/"
    format: "parquet"
    rotate_mb: 500
  - type: "clickhouse"
    table: "rec_traces"
    batch_size: 1000
    flush_interval_sec: 5

metrics:
  enabled: true
  port: 9090
  custom_metrics:
    - name: "rec_request_latency_ms"
      type: "histogram"
      buckets: [10, 50, 100, 200, 500]
    - name: "rec_recall_count"
      type: "histogram"
      buckets: [100, 500, 1000, 3000, 5000]
    - name: "rec_items_exposed"
      type: "counter"
