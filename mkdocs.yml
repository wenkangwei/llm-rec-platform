      - LLM 多厂商集成: tutorials/llm-integration.md
      - 特征平台使用: tutorials/feature-platform.md
      - A/B 实验配置: tutorials/ab-testing.md
      - 智能对话运维: tutorials/agent-chat.md
  - 架构指南:
      - 系统总览: architecture/overview.md
      - 推荐流水线: architecture/pipeline.md
      - LLM 模块: architecture/llm-module.md
      - 配置系统: architecture/config-system.md
      - 存储层: architecture/storage.md
      - 监控追踪: architecture/monitoring.md
  - API 参考:
