site_name: LLM 推荐系统平台
site_description: LLM 驱动的智能推荐系统运维平台技术文档
site_author: LLM Rec Platform Team
copyright: Copyright &copy; 2024-2026 LLM Rec Platform

theme:
  name: material
  language: zh
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换暗色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换亮色模式

plugins:
  - search:
      lang: [zh, en]
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.tabbed
  - pymdownx.tasklist
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - footnotes

nav:
  - 首页: index.md
  - 快速开始:
      - 环境安装: quickstart/installation.md
      - 第一个请求: quickstart/first-request.md
      - Docker 部署: quickstart/docker-deploy.md
  - 教程:
